services:
  backend:
    build:
      context: ./backend
    environment:
      DATA_DIR: /data
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRANSFER_CHUNK_SIZE: ${TRANSFER_CHUNK_SIZE:-16777216}
      TRANSFER_PREFETCH_CHUNKS: ${TRANSFER_PREFETCH_CHUNKS:-4}
      TRANSFER_PARALLEL_FILES: ${TRANSFER_PARALLEL_FILES:-2}
      TRANSFER_FILE_STREAMS: ${TRANSFER_FILE_STREAMS:-4}
      TRANSFER_FILE_STREAM_MIN_SIZE: ${TRANSFER_FILE_STREAM_MIN_SIZE:-1073741824}
      SMB_REQUIRE_SIGNING: ${SMB_REQUIRE_SIGNING:-true}
      SMB_AUTH_PROTOCOL: ${SMB_AUTH_PROTOCOL:-negotiate}
    volumes:
      - jarvis-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jarvis-data:
